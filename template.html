<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #0a0a0a;
    position: relative;
}

.bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(100%) brightness(0.7) contrast(1.2);
}

.overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.1) 30%,
        rgba(0,0,0,0.1) 70%,
        rgba(0,0,0,0.7) 100%
    );
}

.content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 60px;
}

.quote {
    color: #cc2222;
    font-size: 52px;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 2px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8), 0 0 40px rgba(180,0,0,0.3);
    font-family: 'Georgia', 'Times New Roman', serif;
    max-width: 900px;
    margin-bottom: 40px;
}

.quote-small {
    color: #cc2222;
    font-size: 38px;
    font-weight: bold;
    text-align: center;
    line-height: 1.4;
    letter-spacing: 1.5px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8), 0 0 40px rgba(180,0,0,0.3);
    font-family: 'Georgia', 'Times New Roman', serif;
    max-width: 900px;
    margin-bottom: 40px;
}

.author {
    color: #999;
    font-size: 24px;
    font-style: italic;
    text-align: center;
    margin-top: 30px;
    letter-spacing: 1px;
}

.brand {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
    color: #666;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
}

.corner-tag {
    position: absolute;
    top: 40px;
    right: 40px;
    color: #555;
    font-size: 16px;
    letter-spacing: 2px;
}
</style>
</head>
<body>
    <img class="bg" src="BACKGROUND_URL" crossorigin="anonymous" onerror="this.style.display='none'">
    <div class="overlay"></div>
    <div class="content">
        <div class="quote">QUOTE_TEXT</div>
        <div class="author">— AUTHOR_NAME</div>
    </div>
    <div class="brand">MENSANITY</div>
</body>
</html>
